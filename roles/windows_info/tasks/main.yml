---
- name: Display Hostname
  debug:
    msg: "{{ hostname_message }}: {{ ansible_hostname }}"

- name: Display Operating System
  debug:
    msg: "{{ os_message }}: {{ ansible_distribution }}"

- name: Display IP Address
  debug:
    msg: "{{ ip_message }}: {{ ansible_ip_addresses }}"

- name: Create Windows Info Marker File
  ansible.windows.win_copy:
    content: "Windows information role executed successfully."
    dest: C:\Temp\windows_info_status.txt
  notify: Restart Windows Spooler

- name: Copy welcome template
  ansible.builtin.template:
    src: welcome.j2
    dest: C:\Temp\Welcome.txt
    
- name: Copy role README
  ansible.windows.win_copy:
    src: README.md
    dest: C:\Temp\Role_README.md

- name: Copy role README
  ansible.windows.win_copy:
    src: README.md
    dest: C:\Temp\Role_README.md

- name: Create Logs Folder
  ansible.windows.win_file:
    path: C:\Training\Logs
    state: directory

- name: Create Temp Report
  ansible.windows.win_copy:
    content: "Ansible Training Completed"
    dest: C:\Training\Logs\report.txt

- name: Display Completion Message
  debug:
    msg: "Windows Info role completed successfully."
